<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurants</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="scripts/map.js" defer></script>
    <script type="module" src="scripts/app.js" defer></script>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <img class="logo" src="assets/images/sitelogo.jpg" alt="Logo" />

        <div class="header-right">
          <button type="button" class="search-btn">Search restaurant</button>
          <button
            class="profile-btn"
            onclick="window.location.href = 'profile.html'"
          >
            Profile
          </button>
          <button id="login-btn" class="login-btn">Login</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <section id="map-container">
        <div id="map"></div>
      </section>

      <section id="list-container">
        <div id="restaurant-list"></div>

        <div id="pagination">
          <button id="prev-page">← Prev</button>
          <span id="page-info"></span>
          <button id="next-page">Next →</button>
        </div>
      </section>
    </main>

    <!--Modal window for the restaurants information-->
    <div id="restaurant-modal" class="hidden">
      <div class="modal-content restaurant-modal"></div>
    </div>

    <!--Modal window for the restaurants searching-->
    <div id="filter-modal" class="hidden">
      <div class="modal-content filter-modal">
        <button class="close-modal">x</button>

        <h2>Search Filters</h2>

        <label for="filter-address">Address</label>
        <input type="text" id="filter-address" placeholder="Enter address" />

        <div class="radio-group">
          <input type="radio" id="use-location" name="location-option" />
          <label for="use-location">Use my location</label>
        </div>

        <label for="filter-keyword">Keyword</label>
        <input type="text" id="filter-keyword" placeholder="e.g. pasta, soup" />

        <label>Diet</label>
        <div class="diet-options">
          <!-- Plant-based -->
          <label><input type="checkbox" value="veg" /> Vegetarian</label>
          <label><input type="checkbox" value="vs" /> Vegan</label>

          <!-- Allergies / intolerances -->
          <label><input type="checkbox" value="g" /> Gluten-free</label>
          <label><input type="checkbox" value="l" /> Lactose-free</label>
          <label><input type="checkbox" value="m" /> Milk-free</label>
          <label><input type="checkbox" value="ilm" /> No milk</label>
          <label><input type="checkbox" value="vl" /> Low-lactose</label>

          <!-- Other -->
          <label><input type="checkbox" value="a" /> Contains allergens</label>
          <label><input type="checkbox" value="*" /> Special</label>
        </div>

        <div class="filter-buttons">
          <button class="apply-btn">Apply</button>
          <button class="clear-btn">Clear</button>
        </div>
      </div>
    </div>

    <div id="loading-modal" class="hidden loading-modal">
      <div class="loading-content">
        <p>Processing your request...</p>
      </div>
    </div>

    <!--Modal window for the login/registration-->
    <div id="login-modal" class="hidden">
      <div class="modal-content login-modal"></div>
    </div>
  </body>
</html>
